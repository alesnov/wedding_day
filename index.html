<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Артур и Диляра</title>

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

</head>

<body>

<!-- 3D background -->
<canvas id="three-bg"></canvas>


<!-- OPENING INVITATION -->

<div id="opening">

<div class="card">

<h1>Приглашение</h1>

<p>Артур & Диляра</p>

<button onclick="enterSite()">Открыть</button>

</div>

</div>


<audio id="music" autoplay loop>
<source src="music/wedding.mp3">
</audio>


<section class="hero">

<h1>Артур & Диляра</h1>

<p>29 августа 2026</p>

</section>


<section>

<h2>До свадьбы осталось</h2>

<div class="countdown">

<div><span id="days"></span>дней</div>
<div><span id="hours"></span>часов</div>
<div><span id="minutes"></span>минут</div>
<div><span id="seconds"></span>секунд</div>

</div>

</section>


<!-- RSVP -->

<section>

<h2>Подтвердите присутствие</h2>

<form id="rsvp-form">

<label>Будете ли вы присутствовать</label>

<select id="presence">
<option>Да</option>
<option>Нет</option>
</select>


<label>Что будете пить</label>

<select>

<option>вино красное</option>
<option>вино белое</option>
<option>водка</option>
<option>коньяк</option>
<option>виски</option>
<option>не пью</option>

</select>


<label>С кем придете</label>

<select id="guests">

<option value="1">я один</option>
<option value="2">я +1</option>
<option value="3">я +2</option>
<option value="4">я +3</option>

</select>


<div id="extraGuests"></div>

<button type="submit">
Отправить ответ
</button>

</form>

</section>


<!-- МЕСТО ПРОВЕДЕНИЯ -->

<section>

<div class="detail-card">

<h3>Место проведения</h3>

<p>

<strong>Republic Hall</strong><br>
Волоколамское ш., 124<br>
Москва, Россия

</p>

<div class="map-container">

<iframe src="https://yandex.ru/map-widget/v1/?um=constructor:CPQjJO2e&ll=37.405937,55.830979&z=16&source=constructor"
width="100%"
height="300"
frameborder="0">
</iframe>

</div>

<a href="https://yandex.ru/maps/-/CPQjJO2e"
target="_blank"
class="route-btn">

Построить маршрут

</a>

</div>

</section>


<!-- РАССАДКА -->

<section>

<h2>Рассадка гостей</h2>

<div id="seating-map"></div>

</section>


<!-- ФОТО ГОСТЕЙ -->

<section>

<h2>Поделитесь фото</h2>

<p>Отсканируйте QR</p>

<!-- QR код указывается здесь -->

<img src="images/qr-photo.jpeg" width="200">

<div class="upload">

<input type="file" id="photoUpload">

</div>

<div id="photoGallery"></div>

</section>


<script src="js/app.js"></script>
<script src="js/countdown.js"></script>
<script src="js/rsvp.js"></script>
<script src="js/seating.js"></script>
<script src="js/gallery.js"></script>
<script src="js/three-bg.js"></script>

</body>
</html>
